name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: '.'
  TESTS_PATH: 'Lab09_PackagedApp.Tests'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Test with coverage
      run: |
        if (Test-Path "${{ env.TESTS_PATH }}") {
          dotnet test ${{ env.TESTS_PATH }} --configuration Release --no-restore --collect:"XPlat Code Coverage" --results-directory ./coverage
        } else {
          Write-Host "Brak projektu testowego, pomijam krok."
        }

    - name: Publish
      run: dotnet publish --configuration Release --runtime win-x64 --output ./publish -p:Platform=x64 -p:PublishReadyToRun=false -p:PublishTrimmed=false

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-build
        path: ./publish/

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: ./coverage/**/coverage.cobertura.xml
